# Taruh di: .github/workflows/merged.yml
# Cloud HANYA HyperDash (Binance diblokir 451 dari IP GitHub). Snapshot UPNL tiap jam.
name: BTC Merged Hourly
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: merged-archive
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Collect HyperDash UPNL
        run: python cloud_hyperdash.py
      - name: Commit
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase --autostash || true
          git add upnl_history.csv
          git diff --staged --quiet || git commit -m "cloud upnl $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
